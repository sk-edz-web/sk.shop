  <style>
    /* === YOUR EXACT ORIGINAL STYLES (unchanged) === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fc;
      background: radial-gradient(circle at 10% 30%, #e9eff7, #dbe5f0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #1b2b40;
      line-height: 1.4;
    }
    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.2rem 1.8rem;
      width: 100%;
      flex: 1;
    }
    /* ===== DESKTOP HEADER ===== */
    .desktop-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0 2rem 0;
      flex-wrap: wrap;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo-icon {
      font-size: 2.2rem;
      color: #1e3c5c;
      filter: drop-shadow(0 6px 10px rgba(22, 78, 161, 0.15));
      animation: softGlow 3s infinite alternate;
    }
    @keyframes softGlow {
      0% { filter: drop-shadow(0 4px 8px rgba(0,60,130,0.2)); }
      100% { filter: drop-shadow(0 12px 18px rgba(0,90,200,0.35)); }
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, #13293D, #1F4E79);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .desktop-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .desktop-actions .action-btn {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.95rem;
      color: #13293D;
      border: 1px solid rgba(255,255,255,0.7);
      transition: 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .desktop-actions .action-btn i { margin-right: 6px; color: #2c5779; }
    .desktop-actions .action-btn:hover {
      background: white;
      border-color: #a0c6e9;
      transform: scale(1.02);
    }
    /* Wishlist & Cart header icons */
    .header-icon {
      position: relative;
      font-size: 1.6rem;
      color: #1e3c5c;
      background: rgba(255,255,255,0.5);
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.7);
      transition: 0.2s;
      cursor: pointer;
      text-decoration: none;
    }
    .header-icon:hover { background: white; transform: scale(1.05); }
    .header-icon .badge {
      position: absolute;
      top: -5px; right: -5px;
      background: #1e5a88;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
    }
    .icon-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    /* ----- MOBILE NAVIGATION ----- */
    .mobile-nav { display: none; }
    /* ===== PRODUCT GRID ===== */
    .buy-hero { margin: 1rem 0 2rem 0; }
    .buy-hero-content .badge {
      background: rgba(43, 108, 176, 0.18);
      backdrop-filter: blur(3px);
      display: inline-block;
      padding: 0.4rem 1.1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1e4f7a;
      border: 1px solid rgba(255,255,255,0.5);
      margin-bottom: 1.2rem;
    }
    .buy-hero-content h1 {
      font-size: clamp(2.4rem, 7vw, 3.8rem);
      font-weight: 700;
      line-height: 1.1;
      background: linear-gradient(155deg, #102b40, #264e70, #1b3b55);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin-bottom: 1rem;
    }

    /* ===== CATEGORY FILTERS ===== */
    .category-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin: 1rem 0 2rem 0;
      justify-content: center;
    }
    .category-btn {
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 60px;
      padding: 0.6rem 1.4rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e3c5c;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .category-btn i { color: #2c5779; }
    .category-btn:hover {
      background: white;
      transform: translateY(-2px);
      border-color: #a0c6e9;
    }
    .category-btn.active {
      background: #1e5a88;
      color: white;
      border-color: #1e5a88;
      box-shadow: 0 8px 16px rgba(30,90,136,0.2);
    }
    .category-btn.active i { color: white; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0 3rem;
      justify-content: center;
    }
    /* Product Card */
    .product-card {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 1rem;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 20px 30px -15px rgba(26, 67, 113, 0.25);
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      animation: cardAppear 0.6s backwards;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.5);
      border-color: white;
      box-shadow: 0 28px 40px -12px #1b4c79;
    }
    @keyframes cardAppear {
      0% { opacity: 0; transform: translateY(20px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .product-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #d9e3ed;
      border-radius: 16px;
      margin-bottom: 0.8rem;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2c6b9e;
      font-size: 3rem;
    }
    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #13293D;
    }
    .product-price {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1e5a88;
      margin-top: 0.25rem;
    }
    /* New Wishlist Button on Card */
    .card-wishlist-btn {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 40px;
      padding: 0.5rem 0.8rem;
      margin-top: 0.8rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #b13e6b;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      pointer-events: auto;
    }
    .card-wishlist-btn i { color: #c13b6f; font-size: 0.9rem; }
    .card-wishlist-btn:hover {
      background: white;
      border-color: #ffb0c3;
      color: #a12b5a;
      transform: scale(1.02);
    }
    /* Full-screen modal (original small size) */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0; visibility: hidden;
      transition: 0.25s ease;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-content {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(20px);
      width: 90%; max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 40px;
      padding: 2rem;
      border: 1px solid white;
      box-shadow: 0 40px 60px -20px #0a2a41;
      transform: scale(0.95);
      transition: 0.3s;
    }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-close {
      float: right;
      font-size: 1.5rem;
      background: none;
      border: none;
      color: #1f4e79;
      cursor: pointer;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.5);
    }
    .modal-close:hover { background: white; }
    .modal-product-image {
      width: 100%; height: 200px;
      background: #cbdae7;
      border-radius: 20px;
      margin: 1rem 0 1.2rem;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-product-image img { width: 100%; height: 100%; object-fit: cover; }
    .modal-title { font-size: 1.8rem; font-weight: 700; color: #102b40; }
    .modal-price { font-size: 1.8rem; font-weight: 700; color: #1e5a88; margin: 0.5rem 0 1rem; }
    .modal-description { color: #2f5579; line-height: 1.6; margin-bottom: 1.8rem; font-size: 1rem; }
    .modal-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .modal-btn {
      flex: 1; padding: 0.8rem; border-radius: 40px; border: none; font-weight: 600; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.7);
    }
    .btn-add-cart { background: rgba(43, 98, 142, 0.8); color: white; }
    .btn-buy-now { background: #1e5a88; color: white; }
    .modal-btn:hover { transform: scale(1.02); filter: brightness(1.05); }
    /* Checkout Modal (WhatsApp form) - original */
    .checkout-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(12px);
      z-index: 2100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0; visibility: hidden;
      transition: 0.25s;
    }
    .checkout-overlay.active { opacity: 1; visibility: visible; }
    .checkout-content {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(20px);
      width: 90%; max-width: 450px;
      border-radius: 40px;
      padding: 2rem;
    }
    .checkout-content h2 { color: #102b40; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-weight: 500; color: #1d4e75; margin-bottom: 0.3rem; }
    .form-control {
      width: 100%; padding: 0.9rem 1.2rem;
      background: rgba(255,255,255,0.6);
      border: 1px solid white;
      border-radius: 60px;
      font-size: 1rem;
      outline: none;
    }
    .form-control:focus { background: white; }
    .checkout-total { font-size: 1.4rem; font-weight: 700; color: #102b40; margin: 1rem 0; text-align: right; }
    .checkout-actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .btn-place-order { background: #1e5a88; color: white; border: none; }

    /* Toast notification (new) */
    .toast-container {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    .toast {
      background: #1e5a88;
      color: white;
      padding: 1rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      box-shadow: 0 15px 25px -8px rgba(0,40,80,0.4);
      margin-bottom: 0.5rem;
      animation: slideUp 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
      border-left: 6px solid #ffc107;
      backdrop-filter: blur(10px);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
      max-width: 90%;
      font-size: 1rem;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-10px); }
    }

    /* Footer */
    .footer-note {
      margin-top: 4rem; padding: 1.8rem 0.5rem;
      text-align: center; border-top: 1px solid rgba(255,255,255,0.6);
      font-weight: 300; color: #2e5375;
    }
    /* Loading Spinner */
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #1e5a88;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-container {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: #1e5a88;
    }
    
    /* -------------------- RESPONSIVE (MOBILE) -------------------- */
    @media screen and (max-width: 768px) {
      .app { padding: 0.8rem 1.2rem; }
      .desktop-actions { display: none; }
      
      .product-grid {
        grid-template-columns: repeat(2, 1fr); 
        gap: 0.8rem;
        margin: 1.5rem 0 2rem;
      }
      .product-card {
        padding: 0.7rem;
        border-radius: 16px;
      }
      .product-title {
        font-size: 0.9rem;
      }
      .product-price {
        font-size: 1rem;
      }
      .card-wishlist-btn {
        padding: 0.4rem;
        font-size: 0.75rem;
        margin-top: 0.5rem;
      }

      .mobile-nav {
        display: flex;
        position: fixed;
        bottom: 16px;
        left: 12px;
        right: 12px;
        background: rgba(30, 50, 75, 0.75);
        backdrop-filter: blur(20px);
        border-radius: 60px;
        padding: 0.8rem 1.2rem;
        justify-content: space-around;
        z-index: 1000;
      }
      .mobile-nav a {
        color: rgba(255,255,255,0.9);
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 0.85rem;
        text-decoration: none;
      }
      .mobile-nav a i { font-size: 1.5rem; }
      body { padding-bottom: 85px; }
    }
    @media screen and (min-width: 769px) {
      .mobile-nav { display: none !important; }
      body { padding-bottom: 0; }
    }
  </style>
</head>

  <script>
    (function() {
      // ========== FIREBASE CONFIG ==========
      const firebaseConfig = {
        apiKey: "AIzaSyBxc6D8eZyDgRhClZXeaYJuzvruy7S-nrI",
        authDomain: "sk-shop-admin.firebaseapp.com",
        databaseURL: "https://sk-shop-admin-default-rtdb.firebaseio.com",
        projectId: "sk-shop-admin",
        storageBucket: "sk-shop-admin.firebasestorage.app",
        messagingSenderId: "269505526934",
        appId: "1:269505526934:web:35c68fe963961703e8d6b7",
        measurementId: "G-FH3CMFTZVQ"
      };

      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const database = firebase.database();
      const productsRef = database.ref('products');

      // ========== GLOBAL STATE ==========
      let allProducts = [];
      let currentCategory = 'all';
      let currentModalProduct = null;

      // Cart and Wishlist (stored in localStorage)
      let cart = JSON.parse(localStorage.getItem('sk_cart')) || [];
      let wishlist = JSON.parse(localStorage.getItem('sk_wishlist')) || [];

      // DOM Elements
      const productGrid = document.getElementById('product-grid');
      const categoryFiltersDiv = document.getElementById('categoryFilters');
      const modalOverlay = document.getElementById('productModal');
      const modalContent = document.getElementById('modalProductContent');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const checkoutOverlay = document.getElementById('checkoutModal');
      const cancelCheckoutBtn = document.getElementById('cancelCheckoutBtn');
      const placeOrderBtn = document.getElementById('placeOrderBtn');
      const fullNameInput = document.getElementById('fullName');
      const phoneInput = document.getElementById('phoneNumber');
      const addressInput = document.getElementById('address');
      const checkoutTotalSpan = document.getElementById('checkoutTotal');
      const checkoutProductInfo = document.getElementById('checkoutProductInfo');
      const toastContainer = document.getElementById('toastContainer');

      // Badges
      const wishlistBadge = document.getElementById('wishlist-count-badge');
      const cartBadge = document.getElementById('cart-count-badge');

      // ========== UTILITY FUNCTIONS ==========
      function updateBadges() {
        if (wishlistBadge) wishlistBadge.textContent = wishlist.length;
        if (cartBadge) cartBadge.textContent = cart.reduce((acc, item) => acc + (item.quantity || 1), 0);
      }

      function saveCart() {
        localStorage.setItem('sk_cart', JSON.stringify(cart));
        updateBadges();
      }

      function saveWishlist() {
        localStorage.setItem('sk_wishlist', JSON.stringify(wishlist));
        updateBadges();
      }

      function showToast(message, icon = '✅') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${icon} ${message}`;
        toastContainer.appendChild(toast);
        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      // ========== SAFE PRODUCT FIELD ACCESS ==========
      function getProductField(product, possibleNames, defaultValue = '') {
        for (let name of possibleNames) {
          if (product[name] !== undefined) return product[name];
        }
        return defaultValue;
      }

      function normalizeProduct(id, raw) {
        return {
          id: id,
          title: getProductField(raw, ['title', 'name', 'productName', 'item'], 'Unnamed Product'),
          price: parseFloat(getProductField(raw, ['price', 'prix', 'cost', 'amount'], 0)) || 0,
          description: getProductField(raw, ['description', 'desc', 'details'], ''),
          category: getProductField(raw, ['category', 'cat', 'type'], ''),
          image: getProductField(raw, ['image', 'img', 'photo', 'picture'], '')
        };
      }

      // ========== CART & WISHLIST ACTIONS ==========
      function addToCart(product, quantity = 1) {
        if (!product || !product.id) {
          console.error('Invalid product for cart:', product);
          return;
        }
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
          existing.quantity = (existing.quantity || 1) + quantity;
        } else {
          cart.push({
            id: product.id,
            title: product.title,
            price: product.price,
            image: product.image || '',
            quantity: quantity
          });
        }
        saveCart();
        showToast(`Added ${product.title} to cart`, '🛒');
      }

      function addToWishlist(product) {
        if (!product || !product.id) {
          console.error('Invalid product for wishlist:', product);
          return;
        }
        if (!wishlist.some(item => item.id === product.id)) {
          wishlist.push({
            id: product.id,
            title: product.title,
            price: product.price,
            image: product.image || ''
          });
          saveWishlist();
          showToast(`Added ${product.title} to wishlist`, '❤️');
        } else {
          showToast(`${product.title} is already in wishlist`, 'ℹ️');
        }
      }

      // ========== RENDER PRODUCTS ==========
      function renderProducts(products) {
        if (!products.length) {
          productGrid.innerHTML = '<div class="loading-container"><p>No products found.</p></div>';
          return;
        }

        let html = '';
        products.forEach(product => {
          const imageHtml = product.image 
            ? `<img src="${product.image}" alt="${product.title}">` 
            : `<i class="fas fa-box-open"></i>`;
          html += `
            <div class="product-card" data-id="${product.id}">
              <div class="product-image">${imageHtml}</div>
              <div class="product-title">${product.title}</div>
              <div class="product-price">₹${product.price}</div>
              <button class="card-wishlist-btn" data-id="${product.id}"><i class="fas fa-heart"></i> Wishlist</button>
            </div>
          `;
        });
        productGrid.innerHTML = html;
      }

      // ========== EVENT DELEGATION (handles clicks on cards and wishlist buttons) ==========
      productGrid.addEventListener('click', (e) => {
        const wishlistBtn = e.target.closest('.card-wishlist-btn');
        if (wishlistBtn) {
          e.stopPropagation();
          const id = wishlistBtn.dataset.id;
          const product = allProducts.find(p => p.id === id);
          if (product) addToWishlist(product);
          return;
        }

        const card = e.target.closest('.product-card');
        if (card) {
          const id = card.dataset.id;
          const product = allProducts.find(p => p.id === id);
          if (product) openProductModal(product);
        }
      });

      // ========== CATEGORY FILTER ==========
      function renderCategoryFilters(products) {
        const categories = ['all', ...new Set(products.map(p => p.category).filter(Boolean))];
        let html = '';
        categories.forEach(cat => {
          const activeClass = cat === currentCategory ? 'active' : '';
          const icon = cat === 'all' ? 'fas fa-layer-group' : 'fas fa-tag';
          html += `<button class="category-btn ${activeClass}" data-category="${cat}"><i class="${icon}"></i> ${cat}</button>`;
        });
        categoryFiltersDiv.innerHTML = html;

        document.querySelectorAll('.category-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            currentCategory = btn.dataset.category;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (currentCategory === 'all') {
              renderProducts(allProducts);
            } else {
              const filtered = allProducts.filter(p => p.category === currentCategory);
              renderProducts(filtered);
            }
          });
        });
      }

      // ========== FETCH PRODUCTS FROM FIREBASE ==========
      productsRef.once('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          allProducts = Object.keys(data).map(key => normalizeProduct(key, data[key]));
          console.log('Products loaded:', allProducts.length);
          if (allProducts.length > 0) {
            console.log('First product structure:', allProducts[0]);
          }
        } else {
          allProducts = [];
        }

        productGrid.innerHTML = ''; // remove loading spinner

        if (allProducts.length === 0) {
          productGrid.innerHTML = '<div class="loading-container"><p>No products available.</p></div>';
          return;
        }

        renderCategoryFilters(allProducts);
        renderProducts(allProducts);
      }).catch(error => {
        console.error('Firebase fetch error:', error);
        productGrid.innerHTML = '<div class="loading-container"><p>Error loading products. Please try again.</p></div>';
      });

      // ========== MODAL FUNCTIONS ==========
      function openProductModal(product) {
        currentModalProduct = product;
        const imageHtml = product.image 
          ? `<img src="${product.image}" alt="${product.title}">` 
          : `<i class="fas fa-box-open" style="font-size:4rem;"></i>`;
        modalContent.innerHTML = `
          <div class="modal-title">${product.title}</div>
          <div class="modal-product-image">${imageHtml}</div>
          <div class="modal-price">₹${product.price}</div>
          <div class="modal-description">${product.description || 'No description available.'}</div>
          <div class="modal-actions">
            <button class="modal-btn btn-add-cart" id="modalAddToCart"><i class="fas fa-cart-plus"></i> Add to Cart</button>
            <button class="modal-btn btn-buy-now" id="modalBuyNow"><i class="fas fa-bolt"></i> Buy Now</button>
          </div>
        `;
        modalOverlay.classList.add('active');

        document.getElementById('modalAddToCart').addEventListener('click', () => {
          addToCart(product);
          modalOverlay.classList.remove('active');
        });
        document.getElementById('modalBuyNow').addEventListener('click', () => {
          modalOverlay.classList.remove('active');
          openCheckoutModal(product);
        });
      }

      closeModalBtn.addEventListener('click', () => {
        modalOverlay.classList.remove('active');
      });

      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove('active');
      });

      // ========== CHECKOUT MODAL (WHATSAPP) ==========
      function openCheckoutModal(product) {
        currentModalProduct = product;
        checkoutProductInfo.innerHTML = `<strong>${product.title}</strong> - ₹${product.price}`;
        checkoutTotalSpan.textContent = `Total: ₹${product.price}`;
        checkoutOverlay.classList.add('active');
      }

      cancelCheckoutBtn.addEventListener('click', () => {
        checkoutOverlay.classList.remove('active');
      });

      placeOrderBtn.addEventListener('click', () => {
        const name = fullNameInput.value.trim();
        const phone = phoneInput.value.trim();
        const address = addressInput.value.trim();

        if (!name || !phone || !address) {
          showToast('Please fill all fields', '⚠️');
          return;
        }

        if (!currentModalProduct) return;

        const product = currentModalProduct;
        const message = `New Order:%0AName: ${name}%0APhone: ${phone}%0AEmail/Address: ${address}%0AProduct: ${product.title}%0APrice: ₹${product.price}%0AThank you for shopping with SK EDZ!`;

        const whatsappURL = `https://wa.me/919043770232?text=${message}`; // Replace with your number
        window.open(whatsappURL, '_blank');

        checkoutOverlay.classList.remove('active');
        fullNameInput.value = '';
        phoneInput.value = '';
        addressInput.value = '';
        showToast('Redirecting to WhatsApp...', '📲');
      });

      checkoutOverlay.addEventListener('click', (e) => {
        if (e.target === checkoutOverlay) checkoutOverlay.classList.remove('active');
      });

      // ========== INIT BADGES ==========
      updateBadges();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  
  <title>SK EDZ | Website Under Maintenance - Coming Soon</title>
  <meta name="description" content="SK EDZ is currently under maintenance. We are launching our new platform for Reel Editing, Custom Framing, and Web Design soon. Contact us for orders.">
  <meta name="keywords" content="SK EDZ, Trichy, reel editing, custom framing, website development, SK EDZ contact">
  <meta name="robots" content="index, follow">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="icon" href="logo.jpg" type="image/png">

  <style>
    /* === RESET + GLOBAL === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 30%, #e9eff7, #dbe5f0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1b2b40;
      /* Scroll Fix: Always allow vertical scrolling if content is long */
      overflow-y: auto;
      padding: 40px 0;
    }

    .maintenance-container {
      max-width: 600px;
      padding: 1.5rem;
      text-align: center;
      width: 100%;
      margin: auto;
    }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      font-size: 2.5rem;
      color: #1e3c5c;
      animation: softGlow 3s infinite alternate;
    }

    @keyframes softGlow {
      0% { filter: drop-shadow(0 4px 8px rgba(0,60,130,0.2)); }
      100% { filter: drop-shadow(0 12px 18px rgba(0,90,200,0.35)); }
    }

    .logo-text {
      font-weight: 700;
      font-size: 2rem;
      background: linear-gradient(145deg, #13293D, #1F4E79);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* === GLASS CARD === */
    .glass-card {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 3rem 2rem;
      box-shadow: 0 30px 50px -20px rgba(1, 48, 87, 0.3);
      border: 1px solid rgba(255,255,255,0.5);
      animation: slideUp 0.8s ease-out forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      background: rgba(30, 80, 130, 0.1);
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #1e4f7a;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      margin-bottom: 1rem;
      color: #102b40;
      line-height: 1.2;
    }

    p {
      font-size: 1.05rem;
      color: #2f5579;
      margin-bottom: 2.5rem;
      line-height: 1.6;
      max-width: 450px;
      margin-left: auto;
      margin-right: auto;
    }

    .contact-title {
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 1.2rem;
      color: #1e4f7a;
      opacity: 0.8;
    }

    /* === BUTTONS === */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 320px;
      margin: 0 auto;
    }

    .action-btn {
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 1.1rem 1.8rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .btn-mail {
      background: #1e5a88;
      color: white;
      box-shadow: 0 10px 20px -5px rgba(30, 90, 136, 0.4);
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
      box-shadow: 0 10px 20px -5px rgba(37, 211, 102, 0.4);
    }

    .action-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 25px rgba(0,0,0,0.1);
      filter: brightness(1.1);
    }

    .action-btn:active {
      transform: translateY(-1px);
    }

    .footer-text {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #2f5579;
      opacity: 0.6;
      font-weight: 400;
    }

    /* Responsive adjustments for very small screens */
    @media (max-width: 400px) {
      .glass-card { padding: 2rem 1.2rem; }
      .action-btn { font-size: 0.9rem; padding: 0.9rem 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="maintenance-container">
    <div class="logo-area">
      <i class="fas fa-bolt logo-icon"></i>
      <span class="logo-text">SK EDZ</span>
    </div>

    <div class="glass-card">
      <span class="badge"><i class="fas fa-tools"></i> Under Maintenance</span>
      <h1>Something Great is<br>Coming Soon!</h1>
      <p>We are currently upgrading our digital space to serve you better. We'll be back online in no time.</p>
      
      <div class="contact-title">Contact us for orders</div>
      
      <div class="btn-group">
        <a href="mailto:skedz.contact@gmail.com" class="action-btn btn-mail">
          <i class="fas fa-envelope"></i> Email Us
        </a>
        
        <a href="https://wa.me/919345306572" class="action-btn btn-whatsapp">
          <i class="fab fa-whatsapp"></i> WhatsApp Us
        </a>
      </div>
    </div>

    <div class="footer-text">
      © 2026 SK EDZ · Trichy · Made with love
    </div>
  </div>

</body>
</html>
